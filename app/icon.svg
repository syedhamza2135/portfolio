<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Redline caret: the proofreader's "insert here" mark in editor's red over a bond baseline,
       on the ink shell. Pure shapes (no <text>, so no system-font dependency — renders identical
       everywhere) and it reads at 16px. The one editing symbol a stranger knows on sight. -->
  <rect width="32" height="32" rx="7" fill="#191b19" />
  <path d="M7.5 20.5 16 9.5 24.5 20.5" fill="none" stroke="#cf4436" stroke-width="2.9"
        stroke-linecap="round" stroke-linejoin="round" />
  <rect x="8" y="22.3" width="16" height="2.3" rx="1.15" fill="#e6e7e1" />
</svg>
